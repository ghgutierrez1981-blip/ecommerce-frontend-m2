<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tarot del Sol 19</title>

  <!-- Bootstrap -->

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">🔮 Tarot del Sol 19</a>
      
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="carrito.html">
            Carrito <span id="contador" class="badge bg-warning text-dark">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>

<main class="container mt-5">

  <section class="text-center mb-5">
    <h1>Tarot del Sol 19 ✨</h1>
    <p>Encuentra claridad en tu camino</p>
  </section>

  <section class="row">

    <!-- PRODUCTO 1 -->
    <article class="col-md-4">
      <div class="card">
        <img src="img/tarot.png" class="card-img-top">
        <div class="card-body">
          <h5>Pregunta individual</h5>
          <p>$3.000</p>
           <a href="detalle.html" class="btn btn-outline-dark mb-2">Ver más</a>
           <button class="btn btn-dark agregar" data-nombre="Pregunta individual" data-precio="3000">
            Agregar
          </button>
        </div>
      </div>
    </article>

    <!-- PRODUCTO 2 -->
    <article class="col-md-4">
      <div class="card">
        <img src="img/tarot.png" class="card-img-top">
        <div class="card-body">
          <h5>Lectura general</h5>
          <p>$12.000</p>
           <a href="detalle.html" class="btn btn-outline-dark mb-2">Ver más</a>
          <button class="btn btn-dark agregar" data-nombre="Lectura general" data-precio="12000">
            Agregar
          </button>
        </div>
      </div>
    </article>

    <!-- PRODUCTO 3 -->
    <article class="col-md-4">
      <div class="card">
        <img src="img/tarot.png" class="card-img-top">
        <div class="card-body">
          <h5>1 hora de preguntas</h5>
          <p>$20.000</p>
           <a href="detalle.html" class="btn btn-outline-dark mb-2">Ver más</a>
          <button class="btn btn-dark agregar" data-nombre="1 hora de preguntas" data-precio="20000">
            Agregar
          </button>
        </div>
      </div>
    </article>
   </section>

</main>

  <!-- BOTON IR ARRIBA -->
<div class="text-center mt-4">
  <button id="ir-arriba" class="btn btn-secondary">⬆ Ir arriba</button>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>Contactame: +56 9 7580 5746</p>
</footer>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/app.js"></script>

</html>
